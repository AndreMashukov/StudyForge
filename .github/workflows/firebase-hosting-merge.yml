# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Production
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  # Avoid 22.23.0 — node-fetch gzip bug causes premature close (nodejs/node#63989).
  # 22.22.x is stable; 22.23.1+ also works per firebase-tools#10692.
  NODE_VERSION: '22.22.0'
  # 15.22.2+ retries without keep-alive after premature close, which can false-fail
  # with "current active version" if the first release already succeeded. Prefer
  # preventing premature close via Node pin over relying on that retry path.
  FIREBASE_TOOLS_VERSION: '15.22.2'

permissions:
  contents: read
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Derive appropriate SHAs for base and head for `nx affected` commands
        uses: nrwl/nx-set-shas@v4

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint affected projects
        run: yarn nx affected -t lint --parallel=3

      - name: Test affected projects
        run: yarn nx affected -t test --parallel=3

      - name: Type check affected projects
        run: yarn nx affected -t typecheck --parallel=3

  build_and_deploy:
    runs-on: ubuntu-latest
    needs: test
    if: always() && (needs.test.result == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build web app
        run: yarn nx build web --configuration=production
        env:
          NX_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NX_PUBLIC_FIREBASE_API_KEY }}
          NX_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NX_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NX_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NX_PUBLIC_FIREBASE_PROJECT_ID }}
          NX_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NX_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NX_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NX_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NX_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NX_PUBLIC_FIREBASE_APP_ID }}
          NX_PUBLIC_GEMINI_API_KEY: ${{ secrets.NX_PUBLIC_GEMINI_API_KEY }}

      - name: Verify Node version for Firebase CLI
        run: |
          echo "Node: $(node --version)"
          case "$(node --version)" in
            v22.22.*|v22.23.1|v22.23.2|v24.16.*|v24.18.*|v24.19.*|v24.20.*) ;;
            v22.23.0)
              echo "Node 22.23.0 breaks firebase-tools OAuth/release (nodejs/node#63989). Use 22.22.x or 22.23.1+."
              exit 1
              ;;
            *)
              echo "Unexpected Node for firebase-tools: $(node --version)"
              exit 1
              ;;
          esac

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_STUDY_FORGE_202604 }}'
          channelId: live
          projectId: study-forge-202604
          firebaseToolsVersion: ${{ env.FIREBASE_TOOLS_VERSION }}
