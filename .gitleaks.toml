title = "StudyForge gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Placeholder secrets in example env files"
paths = [
  '''\.env\.example$''',
  '''functions/\.env\.example$''',
  '''admin/\.env\.example$''',
  '''\.secret\.local\.example$''',
  '''functions/\.secret\.local\.example$''',
]

regexes = [
  '''your_gemini_api_key_here''',
  '''your-api-key''',
  '''your-api-key-here''',
  '''replace-with-a-long-random-secret''',
  '''sk-minimax-api-key-here''',
  '''YOUR_GENERATED_VALUE''',
]
